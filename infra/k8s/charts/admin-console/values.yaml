image:
  repository: CHANGE_ME_ECR_ACCOUNT.dkr.ecr.CHANGE_ME_REGION.amazonaws.com/a1/admin-console
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 3001

service:
  enabled: true
  type: ClusterIP
  port: 3001

config:
  NEXT_PUBLIC_ADMIN_API_URL: "http://admin-api:8089"
  NODE_ENV: "production"
  LOG_LEVEL: "info"

secretRefs: []

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

readinessProbe:
  httpGet:
    path: /
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2

livenessProbe:
  httpGet:
    path: /
    port: 3001
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: "alb"
  annotations: {}
  hosts: []
  tls: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
securityContext: {}
containerSecurityContext: {}

# Next.js specific volumes
volumes:
  - name: tmp
    emptyDir: {}
  - name: nextjs-cache
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp
  - name: nextjs-cache
    mountPath: /.next
