image:
  repository: CHANGE_ME_ECR_ACCOUNT.dkr.ecr.CHANGE_ME_REGION.amazonaws.com/a1/llm-gateway
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1
containerPort: 8083

service:
  enabled: true
  type: ClusterIP
  port: 8083

config:
  LOG_LEVEL: "info"

# Secrets are provisioned out-of-band (AWS Secrets Manager + External Secrets Operator)
# Chart references them here; does not store secret values
secretRefs:
  - envVarName: OPENAI_API_KEY
    secretName: llm-gateway-secrets
    secretKey: openai-api-key
  - envVarName: ANTHROPIC_API_KEY
    secretName: llm-gateway-secrets
    secretKey: anthropic-api-key
  - envVarName: ANTHROPIC_BASE_URL
    secretName: llm-gateway-secrets
    secretKey: anthropic-base-url

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

readinessProbe:
  httpGet:
    path: /health
    port: 8083
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /health
    port: 8083
  initialDelaySeconds: 15
  periodSeconds: 20

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: "alb"
  annotations: {}
  hosts: []
  tls: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
securityContext: {}
containerSecurityContext: {}
volumes: []
volumeMounts: []
