# Image tag MUST include -prod suffix: image.tag=<sha>-prod
# CI builds this image with production-specific NEXT_PUBLIC_* build args
image:
  tag: "placeholder-prod"

replicaCount: 3

config:
  API_GATEWAY_URL: "http://api-gateway:8080"
  NODE_ENV: "production"
  LOG_LEVEL: "info"

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

ingress:
  enabled: true
  className: "alb"
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:ACCOUNT_PROD:certificate/YYYY"
  hosts:
    - host: studio.a1-agent-engine.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: agent-studio-tls
      hosts:
        - studio.a1-agent-engine.example.com
