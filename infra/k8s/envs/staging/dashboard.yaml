image:
  tag: "placeholder"

replicaCount: 1

config:
  API_GATEWAY_URL: "http://api-gateway:8080"
  LOG_LEVEL: "debug"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "512Mi"

hpa:
  enabled: false

ingress:
  enabled: true
  className: "alb"
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:ACCOUNT:certificate/XXXX"
  hosts:
    - host: dashboard.staging.a1-agent-engine.internal
      paths:
        - path: /
          pathType: Prefix
