services:
  # ------------------------------------
  # Orchestration: Temporal Cluster
  # ------------------------------------
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: temporal
    entrypoint: ["/usr/local/bin/temporal", "server", "start-dev", "--db-filename", "/var/lib/temporal/temporal.db", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - ./temporal_data:/var/lib/temporal
    networks:
      - agent-net

  # ------------------------------------
  # Datastores: Postgres & Redis
  # ------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agentplatform
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentplatform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - agent-net

  # Run all migrations once, then exit.
  migrate:
    image: pgvector/pgvector:pg16
    container_name: migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../postgres/migrations:/migrations
      - ../postgres/migrate.sh:/migrate.sh
    environment:
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
    entrypoint: ["bash", "/migrate.sh"]
    networks:
      - agent-net

  # ------------------------------------
  # Tier-1: Tool Registry  (port 8086)
  # ------------------------------------
  tool-registry:
    build:
      context: ../../
      dockerfile: services/tool-registry/Dockerfile
    container_name: tool-registry
    ports:
      - "8086:8086"
    environment:
      # Remove DATABASE_URL to fall back to in-memory store.
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - agent-net

  # ------------------------------------
  # Tier-2: Skill Catalog  (port 8087)
  # ------------------------------------
  skill-catalog:
    build:
      context: ../../
      dockerfile: services/skill-catalog/Dockerfile
    container_name: skill-catalog
    ports:
      - "8087:8087"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - agent-net

  # ------------------------------------
  # Tier-2: Skill Dispatcher  (port 8085)
  # ------------------------------------
  skill-dispatcher:
    build:
      context: ../../
      dockerfile: services/skill-dispatcher/Dockerfile
    container_name: skill-dispatcher
    ports:
      - "8085:8085"
    environment:
      - WORKFLOW_INITIATOR_URL=http://workflow-initiator:8081
    networks:
      - agent-net

  # ------------------------------------
  # Tier-3: Sub-Agent Registry  (port 8084)
  # ------------------------------------
  sub-agent-registry:
    build:
      context: ../../
      dockerfile: services/sub-agent-registry/Dockerfile
    container_name: sub-agent-registry
    ports:
      - "8084:8084"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - agent-net

  # ------------------------------------
  # Tier-4: Agent Registry  (port 8088)
  # ------------------------------------
  agent-registry:
    build:
      context: ../../
      dockerfile: services/agent-registry/Dockerfile
    container_name: agent-registry
    ports:
      - "8088:8088"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - agent-net

  # ------------------------------------
  # API Gateway  (port 8080)
  # ------------------------------------
  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - WORKFLOW_INITIATOR_URL=http://workflow-initiator:8081
    depends_on:
      - workflow-initiator
    networks:
      - agent-net

  # ------------------------------------
  # Workflow Initiator  (port 8081)
  # ------------------------------------
  workflow-initiator:
    build:
      context: ../../
      dockerfile: services/workflow-initiator/Dockerfile
    container_name: workflow-initiator
    ports:
      - "8081:8081"
    environment:
      - TEMPORAL_HOSTPORT=temporal:7233
      - AGENT_REGISTRY_URL=http://agent-registry:8088
    depends_on:
      - temporal
      - agent-registry
    networks:
      - agent-net

  # ------------------------------------
  # Sandbox Manager  (port 8082)
  # ------------------------------------
  sandbox-manager:
    build:
      context: ../../
      dockerfile: services/sandbox-manager/Dockerfile
    container_name: sandbox-manager
    ports:
      - "8082:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agent-net

  # ------------------------------------
  # LLM Gateway  (port 8083)
  # ------------------------------------
  llm-gateway:
    build:
      context: ../../
      dockerfile: services/llm-gateway/Dockerfile
    container_name: llm-gateway
    ports:
      - "8083:8083"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
    networks:
      - agent-net

  # ------------------------------------
  # Agent Workers (Temporal Python)
  # ------------------------------------
  agent-workers:
    build:
      context: ../../
      dockerfile: services/agent-workers/Dockerfile
    container_name: agent-workers
    restart: on-failure
    environment:
      - TEMPORAL_HOSTPORT=temporal:7233
      - LLM_GATEWAY_URL=http://host.docker.internal:8083/v1
      - TEMPORAL_TASK_QUEUE=default-tenant-agent-queue
      - SANDBOX_MANAGER_URL=http://sandbox-manager:8082/api/v1/execute
      - SKILL_DISPATCHER_URL=http://skill-dispatcher:8085
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
    depends_on:
      - temporal
      - sandbox-manager
    networks:
      - agent-net

  # ------------------------------------
  # Agent Workers (System)  (platform-system-agent-queue)
  # ------------------------------------
  agent-workers-system:
    build:
      context: ../../
      dockerfile: services/agent-workers/Dockerfile
    container_name: agent-workers-system
    restart: on-failure
    environment:
      - TEMPORAL_HOSTPORT=temporal:7233
      - LLM_GATEWAY_URL=http://host.docker.internal:8083/v1
      - TEMPORAL_TASK_QUEUE=platform-system-agent-queue
      - SANDBOX_MANAGER_URL=http://sandbox-manager:8082/api/v1/execute
      - SKILL_DISPATCHER_URL=http://skill-dispatcher:8085
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
    depends_on:
      - temporal
      - sandbox-manager
    networks:
      - agent-net

  # ------------------------------------
  # System Agent Seeder (one-shot)
  # ------------------------------------
  seed-system-agents:
    image: curlimages/curl:latest
    container_name: seed-system-agents
    depends_on:
      agent-registry:
        condition: service_started
    volumes:
      - ./seed_system_agents.sh:/seed.sh:ro
    entrypoint: ["bash", "/seed.sh"]
    environment:
      - AGENT_REGISTRY_URL=http://agent-registry:8088
    networks:
      - agent-net

  # ------------------------------------
  # Admin API  (port 8089)
  # ------------------------------------
  admin-api:
    build:
      context: ../../
      dockerfile: services/admin-api/Dockerfile
    container_name: admin-api
    ports:
      - "8089:8089"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
      - ADMIN_API_KEY=dev-admin-key
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - agent-net

  # ------------------------------------
  # Agent Studio  (port 3000)
  # ------------------------------------
  agent-studio:
    build:
      context: ../../
      dockerfile: apps/agent-studio/Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
        # For local test: browser reaches backends via published ports on the host.
        NEXT_PUBLIC_API_GATEWAY_URL: http://localhost:8080
        NEXT_PUBLIC_TOOL_REGISTRY_URL: http://localhost:8086
        NEXT_PUBLIC_SKILL_CATALOG_URL: http://localhost:8087
        NEXT_PUBLIC_AGENT_REGISTRY_URL: http://localhost:8088
        NEXT_PUBLIC_TENANT_ID: default-tenant
    container_name: agent-studio
    ports:
      - "3000:3000"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
      - tool-registry
      - skill-catalog
      - agent-registry
    networks:
      - agent-net

  # ------------------------------------
  # SRE Dashboard  (port 8501)
  # ------------------------------------
  dashboard:
    build:
      context: ../../
      dockerfile: services/dashboard/Dockerfile
    container_name: dashboard
    ports:
      - "8501:8501"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/agentplatform?sslmode=disable
    depends_on:
      - api-gateway
      - postgres
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  pg-data:
