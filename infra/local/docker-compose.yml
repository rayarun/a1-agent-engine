version: "3.8"

services:
  # ------------------------------------
  # Orchestration: Temporal Cluster
  # ------------------------------------
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: temporal
    ports:
      - "7233:7233" # Internal gRPC port for Go/Python workers
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    depends_on:
      - postgres
    networks:
      - agent-net

  temporal-ui:
    image: temporalio/ui:2.27.1
    container_name: temporal-ui
    ports:
      - "8233:8080" # Web UI port
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    networks:
      - agent-net

  # ------------------------------------
  # Datastores: Postgres & Redis
  # ------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agentplatform
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - agent-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  pg-data:
