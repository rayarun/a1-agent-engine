services:
  # ------------------------------------
  # Orchestration: Temporal Cluster
  # ------------------------------------
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: temporal
    entrypoint: ["/usr/local/bin/temporal", "server", "start-dev", "--db-filename", "/var/lib/temporal/temporal.db", "--ip", "0.0.0.0"]
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - ./temporal_data:/var/lib/temporal
    networks:
      - agent-net

  # UI is now embedded in the temporal container on port 8233

  # ------------------------------------
  # Datastores: Postgres & Redis
  # ------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agentplatform
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentplatform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - agent-net

  # ------------------------------------
  # Application Services
  # ------------------------------------
  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - WORKFLOW_INITIATOR_URL=http://workflow-initiator:8081
    depends_on:
      - workflow-initiator
    networks:
      - agent-net

  workflow-initiator:
    build:
      context: ../../
      dockerfile: services/workflow-initiator/Dockerfile
    container_name: workflow-initiator
    ports:
      - "8081:8081"
    environment:
      - TEMPORAL_HOSTPORT=temporal:7233
    depends_on:
      - temporal
    networks:
      - agent-net

  sandbox-manager:
    build:
      context: ../../
      dockerfile: services/sandbox-manager/Dockerfile
    container_name: sandbox-manager
    ports:
      - "8082:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - agent-net

  llm-gateway:
    build:
      context: ../../
      dockerfile: services/llm-gateway/Dockerfile
    container_name: llm-gateway
    ports:
      - "8083:8083"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - agent-net

  agent-workers:
    build:
      context: ../../
      dockerfile: services/agent-workers/Dockerfile
    container_name: agent-workers
    restart: on-failure
    environment:
      - TEMPORAL_HOSTPORT=temporal:7233
      - LLM_GATEWAY_URL=http://llm-gateway:8083/v1
      - SANDBOX_MANAGER_URL=http://sandbox-manager:8082/api/v1/execute
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/agentplatform
    depends_on:
      - temporal
      - sandbox-manager
      - llm-gateway
    networks:
      - agent-net

  dashboard:
    build:
      context: ../../
      dockerfile: services/dashboard/Dockerfile
    container_name: dashboard
    ports:
      - "8501:8501"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/agentplatform
    depends_on:
      - api-gateway
      - postgres
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  pg-data:
