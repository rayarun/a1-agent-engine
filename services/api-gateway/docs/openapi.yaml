swagger: "2.0"
info:
  title: "API Gateway"
  version: "1.0.0"
host: "localhost:8080"
basePath: "/api/v1"
schemes:
  - "http"
paths:
  /agents/{agent_id}/trigger:
    post:
      summary: "Trigger an agent workflow"
      parameters:
        - name: "agent_id"
          in: "path"
          required: true
          type: "string"
      responses:
        202:
          description: "Workflow triggered"
  /sessions/{id}/status:
    get:
      summary: "Get session status and results"
      parameters:
        - name: "id"
          in: "path"
          required: true
          type: "string"
      responses:
        200:
          description: "Current session status"
