swagger: "2.0"
info:
  title: "Workflow Initiator"
  version: "1.0.0"
host: "localhost:8081"
basePath: "/api/v1"
schemes:
  - "http"
paths:
  /sessions:
    post:
      summary: "Start a new agent session"
      responses:
        201:
          description: "Session started"
  /sessions/{id}:
    get:
      summary: "Get session status from Temporal"
      parameters:
        - name: "id"
          in: "path"
          required: true
          type: "string"
      responses:
        200:
          description: "Current session status"
